name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BUN_INSTALL_ATTEMPTS: 4
  BUN_NETWORK_CONCURRENCY: 4
  BUN_REGISTRY: https://registry.npmjs.org

jobs:
  web:
    name: Web
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-
            ${{ runner.os }}-bun-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: yakumo-web
          cache-on-failure: true

      - name: Install dependencies
        run: node scripts/ci-bun-install.mjs

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build frontend
        run: bun run build

  rust:
    name: Rust
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-
            ${{ runner.os }}-bun-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: yakumo-rust
          cache-on-failure: true

      - name: Install dependencies
        run: node scripts/ci-bun-install.mjs

      - name: Check workspace
        run: cargo check --locked --workspace --all-targets

      - name: Test workspace
        run: cargo test --locked --workspace

      - name: CLI smoke
        run: |
          cargo run --locked -p yaku-cli --bin yaku -- --help
          cargo run --locked -p yaku-cli --bin yaku -- --data-dir "$RUNNER_TEMP/yaku-workspace-schema" workspace schema --pretty
          cargo run --locked -p yaku-cli --bin yaku -- --data-dir "$RUNNER_TEMP/yaku-request-schema" request schema http --pretty
