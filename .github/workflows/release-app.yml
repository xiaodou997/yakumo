name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-latest
            arch: arm64
            rust_targets: wasm32-unknown-unknown,aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
          - name: macOS Intel
            runner: macos-latest
            arch: x64
            rust_targets: wasm32-unknown-unknown,x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,dmg
          - name: Ubuntu
            runner: ubuntu-22.04
            arch: x64
            rust_targets: wasm32-unknown-unknown
            args: --bundles appimage,deb,rpm
          - name: Windows
            runner: windows-latest
            arch: x64
            rust_targets: wasm32-unknown-unknown
            args: --bundles nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release_notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:%s --since="1 month ago")
          else
            COMMITS=$(git log --pretty=format:%s "$PREV_TAG"..HEAD)
          fi

          FEATURES=""
          FIXES=""
          REFACTORS=""
          DOCS=""
          CHORES=""
          OTHERS=""

          while IFS= read -r COMMIT; do
            [ -z "$COMMIT" ] && continue
            case "$COMMIT" in
              feat:*|feat\(*\):*) FEATURES="$FEATURES\n- $COMMIT" ;;
              fix:*|fix\(*\):*) FIXES="$FIXES\n- $COMMIT" ;;
              refactor:*|refactor\(*\):*) REFACTORS="$REFACTORS\n- $COMMIT" ;;
              docs:*|docs\(*\):*) DOCS="$DOCS\n- $COMMIT" ;;
              chore:*|chore\(*\):*|build:*|build\(*\):*|ci:*|ci\(*\):*) CHORES="$CHORES\n- $COMMIT" ;;
              *) OTHERS="$OTHERS\n- $COMMIT" ;;
            esac
          done <<< "$COMMITS"

          BODY="## Yakumo API ${{ github.ref_name }}"
          [ -n "$FEATURES" ] && BODY="$BODY\n\n### Features\n$FEATURES"
          [ -n "$FIXES" ] && BODY="$BODY\n\n### Fixes\n$FIXES"
          [ -n "$REFACTORS" ] && BODY="$BODY\n\n### Refactors\n$REFACTORS"
          [ -n "$DOCS" ] && BODY="$BODY\n\n### Docs\n$DOCS"
          [ -n "$CHORES" ] && BODY="$BODY\n\n### Build and Maintenance\n$CHORES"
          [ -n "$OTHERS" ] && BODY="$BODY\n\n### Other Changes\n$OTHERS"
          BODY="$BODY\n\n### Artifacts\n- macOS Apple Silicon: DMG/App bundle\n- macOS Intel: DMG/App bundle\n- Windows: NSIS installer\n- Linux: AppImage, DEB, RPM when supported by Tauri"

          EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo -e "$BODY" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: yakumo-desktop-${{ matrix.name }}
          cache-on-failure: true

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils rpm

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/replace-version.cjs
        env:
          YAKUMO_VERSION: ${{ github.ref_name }}

      - name: Build and publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YAKUMO_TARGET_ARCH: ${{ matrix.arch }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Yakumo API ${{ github.ref_name }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          args: ${{ matrix.args }}

      - name: Build desktop app
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: bun run tauri build ${{ matrix.args }}
        env:
          YAKUMO_TARGET_ARCH: ${{ matrix.arch }}

      - name: Upload manual build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: yakumo-desktop-${{ matrix.name }}
          path: |
            target/**/release/bundle/**/*
          if-no-files-found: error
